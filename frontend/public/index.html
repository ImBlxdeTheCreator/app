<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>D2Synergy</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0c0f; --panel:#12161b; --panel2:#171c22; --line:#262d34; --line-soft:#1c2228;
    --text:#e9e7e0; --muted:#8b939c; --muted2:#5c646c; --gold:#d4af37;
    --solar:#ff8c42; --arc:#52d9ff; --void:#b98bff; --stasis:#6fd8ea; --strand:#3ddc84; --kinetic:#c9cdd2;
    --danger:#ff5a5f; --good:#3ddc84;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;min-height:100vh;}
  h1,h2,h3,.disp{font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:0.04em;}
  .mono{font-family:'JetBrains Mono',monospace;}
  header.top{
    padding:18px 28px; border-bottom:1px solid var(--line);
    display:flex; align-items:center; justify-content:space-between; gap:16px;
    background:linear-gradient(180deg,#101318,#0a0c0f);
    position:sticky; top:0; z-index:60;
  }
  .accordionHead{position:relative;}
  .panelClear{
    background:none;border:1px solid var(--line-soft);color:var(--muted2);
    padding:3px 9px;border-radius:999px;font-family:'Oswald';text-transform:uppercase;
    font-size:10px;letter-spacing:.08em;cursor:pointer;margin-left:auto;margin-right:10px;
    transition:border-color .15s,color .15s;
  }
  .panelClear:hover{border-color:var(--danger);color:var(--danger);}
  header.top h1{font-size:20px;margin:0;font-weight:700;letter-spacing:0.08em;color:var(--text);}
  header.top .tag{color:var(--muted);font-size:12px;letter-spacing:0.12em;margin-top:2px;font-family:'Inter';text-transform:none;}
  header.top .reset{
    background:none;border:1px solid var(--line);color:var(--muted);padding:8px 14px;border-radius:2px;
    font-family:'Oswald'; text-transform:uppercase; font-size:12px; letter-spacing:0.08em; cursor:pointer;
  }
  header.top .reset:hover{border-color:var(--gold);color:var(--gold);}

  .layout{display:flex;flex-direction:column;gap:1px;background:var(--line);}
  .col{background:var(--bg);padding:20px;min-width:0;}

  .statsplit{display:flex; gap:0; align-items:flex-start;}
  .statsplit > div{flex:1; min-width:0;}
  /* ===== Phase 2: Full-Screen Vault View (DIM / Ishtar style) ===== */
  .fsOverlay{position:fixed;inset:0;z-index:2000;background:var(--bg);display:none;flex-direction:column;}
  .fsOverlay.open{display:flex;}
  .fsHead{display:flex;align-items:center;gap:14px;flex-wrap:wrap;padding:14px 20px;border-bottom:1px solid var(--line);background:linear-gradient(180deg,#101318,#0a0c0f);}
  .fsHead h2{font-size:18px;margin:0;color:var(--text);}
  .fsHead .sub{color:var(--muted);font-size:11px;letter-spacing:.12em;}
  .fsSearch{flex:1;min-width:160px;max-width:360px;padding:9px 12px;background:var(--panel2);border:1px solid var(--line);border-radius:4px;color:var(--text);font-family:'Inter';font-size:13px;}
  .fsSearch:focus{outline:none;border-color:var(--gold);}
  .fsChips{display:flex;gap:6px;flex-wrap:wrap;}
  .fsChip{padding:6px 11px;border:1px solid var(--line);border-radius:999px;background:var(--panel);color:var(--muted);font-size:11px;letter-spacing:.06em;cursor:pointer;font-family:'Oswald';text-transform:uppercase;transition:border-color .15s,color .15s,background-color .15s;}
  .fsChip:hover{border-color:var(--muted);color:var(--text);}
  .fsChip.active{border-color:var(--gold);color:var(--gold);background:rgba(212,175,55,.08);}
  .fsClose{margin-left:auto;background:none;border:1px solid var(--line);color:var(--muted);width:38px;height:38px;border-radius:4px;font-size:20px;cursor:pointer;line-height:1;}
  .fsClose:hover{border-color:var(--danger);color:var(--danger);}
  .fsReload{background:none;border:1px solid var(--line);color:var(--muted);padding:8px 12px;border-radius:4px;font-family:'Oswald';text-transform:uppercase;font-size:11px;letter-spacing:.06em;cursor:pointer;}
  .fsReload:hover{border-color:var(--gold);color:var(--gold);}
  .fsBody{flex:1;display:flex;gap:1px;overflow:auto;background:var(--line);padding:1px;}
  .fsStore{background:var(--bg);min-width:280px;flex:1;display:flex;flex-direction:column;}
  .fsStoreHead{position:sticky;top:0;z-index:5;padding:12px 14px;background:linear-gradient(180deg,#12161b,#0e1116);border-bottom:1px solid var(--line);}
  .fsStoreHead .cls{font-family:'Oswald';text-transform:uppercase;letter-spacing:.06em;font-size:15px;color:var(--text);}
  .fsStoreHead .pw{color:var(--gold);font-size:12px;font-family:'JetBrains Mono';}
  .fsStoreScroll{overflow-y:auto;padding:6px 10px 40px;flex:1;}
  .fsBucket{margin-top:12px;}
  .fsBucketLabel{font-size:10px;color:var(--muted2);text-transform:uppercase;letter-spacing:.1em;margin:0 0 6px;border-bottom:1px solid var(--line-soft);padding-bottom:3px;}
  .fsItems{display:grid;grid-template-columns:repeat(auto-fill,minmax(48px,1fr));gap:6px;}
  .fsItem{position:relative;aspect-ratio:1/1;border:1px solid var(--line);border-radius:4px;overflow:hidden;cursor:pointer;background:var(--panel2);transition:transform .12s,border-color .12s,box-shadow .12s;}
  .fsItem:hover{transform:translateY(-2px);border-color:var(--gold);box-shadow:0 4px 14px rgba(0,0,0,.5);z-index:2;}
  .fsItem img{width:100%;height:100%;object-fit:cover;display:block;}
  .fsItem.exotic{border-color:#ceae33;box-shadow:inset 0 0 0 1px #ceae33;}
  .fsItem.masterwork{border-color:var(--gold);box-shadow:inset 0 0 0 2px rgba(212,175,55,.6);}
  .fsItem.equipped::after{content:"";position:absolute;top:2px;left:2px;width:7px;height:7px;border-radius:50%;background:var(--good);box-shadow:0 0 4px var(--good);}
  .fsItem .pw{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.72);color:#ffd76a;font-size:9px;font-family:'JetBrains Mono';text-align:center;line-height:13px;letter-spacing:.02em;}
  .fsItem .elem{position:absolute;top:2px;right:2px;width:6px;height:6px;border-radius:50%;}
  .fsEmpty{color:var(--muted2);font-size:11px;font-style:italic;padding:2px 0;}
  .fsMenu{position:fixed;z-index:2100;background:var(--panel);border:1px solid var(--gold);border-radius:6px;padding:8px;min-width:190px;box-shadow:0 10px 30px rgba(0,0,0,.6);}
  .fsMenu .mHead{display:flex;gap:8px;align-items:center;padding-bottom:8px;margin-bottom:6px;border-bottom:1px solid var(--line);}
  .fsMenu .mHead img{width:34px;height:34px;border-radius:4px;}
  .fsMenu .mHead .mn{font-size:12px;color:var(--text);line-height:1.2;}
  .fsMenu .mHead .mt{font-size:10px;color:var(--muted);}
  .fsMenu button{display:block;width:100%;text-align:left;background:var(--panel2);border:1px solid var(--line);color:var(--text);padding:7px 10px;border-radius:4px;font-size:12px;margin-top:5px;cursor:pointer;font-family:'Inter';}
  .fsMenu button:hover:not(:disabled){border-color:var(--gold);color:var(--gold);}
  .fsMenu button:disabled{opacity:.4;cursor:default;}
  .fsMenu .mNote{font-size:10px;color:var(--muted2);margin-top:6px;}
  .fsToast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);z-index:2200;background:var(--panel);border:1px solid var(--line);border-left:3px solid var(--gold);color:var(--text);padding:11px 18px;border-radius:4px;font-size:13px;box-shadow:0 8px 24px rgba(0,0,0,.5);max-width:90vw;}
  .fsToast.err{border-left-color:var(--danger);}
  .fsToast.ok{border-left-color:var(--good);}
  .fsState{padding:40px 24px;text-align:center;color:var(--muted);font-size:13px;width:100%;}
  .fsState.err{color:var(--danger);}
  /* Phase 3 windows: vendors + activities */
  .fsBodyCol{flex-direction:column;overflow-y:auto;padding:0;background:var(--bg);}
  .eventBar{display:flex;flex-wrap:wrap;gap:10px;padding:14px 20px;border-bottom:1px solid var(--line);background:linear-gradient(180deg,#141821,#0e1116);}
  .eventPill{display:flex;align-items:center;gap:8px;padding:8px 14px;border:1px solid var(--gold);border-radius:999px;background:rgba(212,175,55,.08);color:var(--gold);font-family:'Oswald';text-transform:uppercase;font-size:12px;letter-spacing:.06em;}
  .eventPill.iron{border-color:var(--arc);color:var(--arc);background:rgba(82,217,255,.08);}
  .eventPill.trials{border-color:var(--solar);color:var(--solar);background:rgba(255,140,66,.08);}
  .resetChips{display:flex;flex-wrap:wrap;gap:10px;padding:12px 20px;border-bottom:1px solid var(--line-soft);}
  .resetChip{font-size:11px;color:var(--muted);border:1px solid var(--line);border-radius:6px;padding:7px 12px;}
  .resetChip b{color:var(--text);font-family:'JetBrains Mono';}
  .actGrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px;padding:16px 20px 40px;}
  .actCard{border:1px solid var(--line);border-radius:8px;overflow:hidden;background:var(--panel);display:flex;flex-direction:column;}
  .actCard .head{display:flex;gap:10px;align-items:center;padding:12px 14px;border-bottom:1px solid var(--line-soft);background:var(--panel2);}
  .actCard .head img{width:40px;height:40px;border-radius:4px;flex-shrink:0;}
  .actCard .head .nm{font-family:'Oswald';text-transform:uppercase;letter-spacing:.04em;font-size:14px;color:var(--text);line-height:1.15;}
  .actCard .head .tag{font-size:10px;letter-spacing:.1em;text-transform:uppercase;}
  .actCard .body{padding:10px 14px 14px;}
  .actCard .desc{font-size:12px;color:var(--muted);line-height:1.5;margin-bottom:8px;}
  .actCard .rw{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text);margin-top:5px;}
  .actCard .rw img{width:26px;height:26px;border-radius:3px;}
  .actCard .rwLabel{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted2);margin:8px 0 3px;}
  .tagWeekly{color:var(--void);} .tagDaily{color:var(--arc);} .tagSpecial{color:var(--gold);}
  .venVendor{border-bottom:1px solid var(--line);padding:16px 20px;}
  .venHead{display:flex;gap:12px;align-items:center;margin-bottom:12px;}
  .venHead img{width:48px;height:48px;border-radius:6px;}
  .venHead .nm{font-family:'Oswald';text-transform:uppercase;letter-spacing:.05em;font-size:17px;color:var(--text);}
  .venHead .sub{font-size:11px;color:var(--muted);}
  .venItems{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:10px;}
  .venItem{display:flex;gap:10px;align-items:center;border:1px solid var(--line);border-radius:6px;padding:8px 10px;background:var(--panel2);}
  .venItem img.ic{width:42px;height:42px;border-radius:4px;flex-shrink:0;}
  .venItem.exotic{border-color:#ceae33;}
  .venItem .nm{font-size:12px;color:var(--text);line-height:1.2;}
  .venItem .typ{font-size:10px;color:var(--muted2);}
  .venItem .cost{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--gold);margin-top:3px;}
  .venItem .cost img{width:15px;height:15px;border-radius:2px;}
  @media (max-width:820px){
    .fsBody{flex-direction:column;overflow-x:hidden;}
    .fsStore{min-width:0;}
    .fsStoreHead{position:static;}
  }

  }

  .accordionHead{
    display:flex; align-items:center; justify-content:space-between; cursor:pointer;
    padding:14px 20px; background:var(--panel2); border-bottom:1px solid var(--line);
    user-select:none;
  }
  .accordionHead h2{font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:0.06em;font-size:15px;margin:0;color:var(--text);}
  .accordionHead .chev{color:var(--gold); font-family:'JetBrains Mono'; font-size:14px; transition:transform .15s;}
  .accordionHead .chev.open{transform:rotate(90deg);}
  .accordionHead .hint{color:var(--muted); font-size:11px; font-family:'Inter'; text-transform:none;}
  .collapsed{display:none;}

  .drawerOverlay{position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:90; opacity:0; pointer-events:none; transition:opacity .2s;}
  .drawerOverlay.open{opacity:1; pointer-events:auto;}
  .drawer{position:fixed; top:0; right:0; height:100%; width:min(380px, 90vw); background:var(--bg); border-left:1px solid var(--line); z-index:91; transform:translateX(100%); transition:transform .25s ease; overflow-y:auto; padding:16px;}
  .drawer.open{transform:translateX(0);}
  .drawerHead{display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; padding-bottom:10px; border-bottom:1px solid var(--line);}

  .drawerRow{
    display:flex; align-items:center; justify-content:space-between;
    padding:16px 4px; border-bottom:1px solid var(--line); cursor:pointer; user-select:none;
  }
  .drawerRow:last-child{border-bottom:none;}
  .drawerRow .rowLabel{font-family:'Oswald',sans-serif; font-size:16px; color:var(--text);}
  .drawerRow .rowChev{color:var(--muted); font-size:15px; transition:transform .15s;}
  .drawerRow .rowChev.open{transform:rotate(90deg);}
  .drawerRow:hover .rowLabel{color:var(--gold);}
  .drawerAccordionBody{padding:4px 4px 16px; border-bottom:1px solid var(--line);}
  .drawerHead h2{font-family:'Oswald',sans-serif; text-transform:uppercase; letter-spacing:.06em; font-size:16px; color:var(--text); margin:0;}
  .drawerClose{background:none; border:none; color:var(--muted); font-size:24px; line-height:1; cursor:pointer; padding:0 4px;}
  .drawerClose:hover{color:var(--gold);}

  .panel{
    position:relative; background:var(--panel); border:1px solid var(--line); margin-bottom:14px; padding:14px 16px 16px;
  }
  .panel::before, .panel::after{content:"";position:absolute;width:10px;height:10px;border-color:var(--gold);opacity:0.55;}
  .panel::before{top:-1px;left:-1px;border-top:2px solid var(--gold);border-left:2px solid var(--gold);}
  .panel::after{bottom:-1px;right:-1px;border-bottom:2px solid var(--gold);border-right:2px solid var(--gold);}
  .panel h3{font-size:13px;margin:0 0 10px;color:var(--muted);letter-spacing:0.1em;display:flex;align-items:center;gap:8px;}
  .panel h3 .n{color:var(--gold);font-family:'JetBrains Mono';font-size:11px;}

  .row{display:flex;gap:8px;flex-wrap:wrap;}
  select, .pillbtn{
    background:var(--panel2); color:var(--text); border:1px solid var(--line); padding:8px 10px; font-size:13px;
    border-radius:2px; font-family:'Inter'; cursor:pointer;
  }
  select{width:100%;}
  select:focus, .pillbtn:focus{outline:1px solid var(--gold);}

  .chipgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:6px;margin-top:6px;}
  .chip{
    border:1px solid var(--line); background:var(--panel2); padding:8px 10px; font-size:12px; cursor:pointer;
    border-radius:2px; line-height:1.35; transition:border-color .1s, background .1s;
  }
  .chip:hover{border-color:var(--muted);}
  .chip.active{border-color:var(--accent,var(--gold)); background:#1c2128; box-shadow:inset 0 0 0 1px var(--accent,var(--gold));}
  .chip .nm{font-weight:600; display:block; margin-bottom:2px;}
  .chip .desc{color:var(--muted); font-size:11px;}
  .chip.disabled{opacity:0.35; cursor:not-allowed;}

  .subclasstabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;}
  .subclasstabs button{
    border:1px solid var(--line); background:var(--panel2); color:var(--muted); padding:7px 12px; font-size:12px;
    font-family:'Oswald'; text-transform:uppercase; letter-spacing:0.06em; cursor:pointer; border-radius:2px;
  }
  .subclasstabs button.active{color:#0a0c0f; font-weight:600;}

  .slotrow{display:flex; align-items:center; gap:8px; margin-bottom:8px;}
  .slotrow label{width:78px; font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:0.06em;}
  .slotrow select{flex:1;}
  .tierpick{display:flex;gap:3px;}
  .tierpick button{
    width:22px;height:22px;border:1px solid var(--line);background:var(--panel2);color:var(--muted);font-size:10px;
    cursor:pointer;border-radius:2px;font-family:'JetBrains Mono';
  }
  .tierpick button.active{background:var(--gold);color:#0a0c0f;border-color:var(--gold);font-weight:700;}

  .modgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:6px;}

  /* readout */
  .barrow{margin-bottom:14px;}
  .barrow .lbl{display:flex;justify-content:space-between;font-size:12px;margin-bottom:5px;}
  .barrow .lbl .name{color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;font-size:11px;}
  .barrow .lbl .val{font-family:'JetBrains Mono';font-weight:600;}
  .barrow .val.pos{color:var(--good);} .barrow .val.neg{color:var(--danger);}
  .track{height:8px;background:#1a1f25;border:1px solid var(--line-soft);position:relative;overflow:hidden;}
  .fill{height:100%;background:var(--gold);}
  .sources{margin-top:6px;font-size:11px;color:var(--muted2);}
  .sources div{padding:1px 0;}
  .sources .sv{color:var(--muted);font-family:'JetBrains Mono';}

  .empty-note{color:var(--muted2);font-size:12px;font-style:italic;padding:6px 0;}
  .summarybar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px;}
  .summarybar .sb{background:var(--panel);border:1px solid var(--line);padding:8px 12px;font-size:11px;color:var(--muted);}
  .summarybar .sb b{color:var(--text);display:block;font-size:13px;font-family:'Oswald';letter-spacing:0.05em;}

  ::-webkit-scrollbar{width:9px;} ::-webkit-scrollbar-track{background:var(--bg);}
  ::-webkit-scrollbar-thumb{background:var(--line);} ::-webkit-scrollbar-thumb:hover{background:var(--muted2);}
</style>
</head>
<body>

<header class="top">
  <div>
    <h1>D2Synergy</h1>
    <div class="tag">for build/theory crafting and damage %'s</div>
  </div>
  <div style="display:flex; flex-direction:column; gap:8px; align-items:stretch;">
    <button class="reset" id="syncDrawerBtn" title="Bungie Account Sync">&#9776;</button>
    <button class="reset" id="resetBtn">Reset Build</button>
  </div>
</header>

<div class="drawerOverlay" id="drawerOverlay"></div>
<div class="drawer" id="syncDrawer">
  <div class="drawerHead">
    <h2>Bungie Account</h2>
    <button class="drawerClose" id="drawerCloseBtn">&times;</button>
  </div>
  <div id="syncCol"></div>
</div>

<!-- Phase 2: Full-Screen Vault View overlay (populated by JS) -->
<div class="fsOverlay" id="vaultFsOverlay" data-testid="vault-fullscreen-overlay">
  <div class="fsHead">
    <div>
      <h2>Vault &amp; Characters</h2>
      <div class="sub">Full-screen inventory</div>
    </div>
    <input class="fsSearch" id="fsSearchInput" type="text" placeholder="Search items..." data-testid="vault-search-input" />
    <div class="fsChips" id="fsElemChips" data-testid="vault-element-filters"></div>
    <div class="fsChips" id="fsTypeChips" data-testid="vault-type-filters"></div>
    <button class="fsReload" id="fsReloadBtn" data-testid="vault-reload-btn">Reload</button>
    <button class="fsClose" id="fsCloseBtn" title="Close" data-testid="vault-close-btn">&times;</button>
  </div>
  <div class="fsBody" id="fsBody" data-testid="vault-body"></div>
</div>

<!-- Phase 3: Vendor Inventories window -->
<div class="fsOverlay" id="vendorsOverlay" data-testid="vendors-overlay">
  <div class="fsHead">
    <div>
      <h2>Vendor Inventories</h2>
      <div class="sub" id="vendorsReset">Live vendor sales</div>
    </div>
    <input class="fsSearch" id="vendorsSearch" type="text" placeholder="Search items..." data-testid="vendors-search-input" />
    <button class="fsReload" id="vendorsReloadBtn" data-testid="vendors-reload-btn">Reload</button>
    <button class="fsClose" id="vendorsCloseBtn" title="Close" data-testid="vendors-close-btn">&times;</button>
  </div>
  <div class="fsBody fsBodyCol" id="vendorsBody" data-testid="vendors-body"></div>
</div>

<!-- Phase 3: Daily & Weekly Activities window -->
<div class="fsOverlay" id="activitiesOverlay" data-testid="activities-overlay">
  <div class="fsHead">
    <div>
      <h2>Daily &amp; Weekly Activities</h2>
      <div class="sub" id="activitiesReset">Milestones &amp; rewards</div>
    </div>
    <button class="fsReload" id="activitiesReloadBtn" data-testid="activities-reload-btn">Reload</button>
    <button class="fsClose" id="activitiesCloseBtn" title="Close" data-testid="activities-close-btn">&times;</button>
  </div>
  <div class="fsBody fsBodyCol" id="activitiesBody" data-testid="activities-body"></div>
</div>

<div class="layout">
  <div class="accordionHead" id="readoutToggle">
    <h2>Build Synergy Readout</h2>
    <span class="hint" id="readoutHint"></span>
    <span class="chev open" id="readoutChev">&#9656;</span>
  </div>
  <div class="col readout" id="readoutCol"></div>

  <div class="accordionHead" id="statsToggle">
    <h2>Character Stats</h2>
    <span class="hint" id="statsHint"></span>
    <span class="chev" id="statsChev">&#9656;</span>

function buildPrismatic(cls){
  const src = SUBCLASSES[cls];
  const supers = PRISMATIC_SUPERS[cls].map(entry=>{
    const s = src[entry.element].supers.find(x=>x.name===entry.name);
    return {name:`${s.name} (${entry.element})`, grants:s.grants, effects:s.effects};
  });
  const aspects = PRISMATIC_ASPECTS[cls].map(entry=>{
    const a = src[entry.element].aspects.find(x=>x.name===entry.name);
    return {name:`${a.name} (${entry.element})`, grants:a.grants, effects:a.effects, fragSlots:entry.fragSlots};
  });
  return {supers, aspects};
}
["Titan","Hunter","Warlock"].forEach(cls=>{

const ALL_ELEMENTS_FOR_PERKS = ["Kinetic","Arc","Solar","Void","Stasis","Strand"];

// Map a frame/archetype name to its weapon-type-locked perk category, if any.
function weaponCategoryFor(name){
  if(/Sword/i.test(name)) return "Swords";
  if(/Glaive/i.test(name)) return "Glaives";
  if(/Shotgun/i.test(name)) return "Shotguns";
  if(/Sniper/i.test(name)) return "Snipers";
  if(/Fusion Rifle/i.test(name)) return "Fusions";
  if(/Bow/i.test(name)) return "Bows";
  if(/Machine Gun/i.test(name)) return "MachineGuns";
  if(/Rocket|Grenade Launcher/i.test(name)) return "Launchers";
  return null;
}

// Builds the base perk pool for a given frame pool key + element: Universal
// perks (always available) + Element-locked perks for the chosen burn.
function buildElementPerkPool(elem){
  return [...UNIVERSAL_PERKS, ...(ELEMENT_LOCKED_PERKS[elem]||[])];
}
const FRAME_PERK_POOLS = {};
Object.keys(FRAME_POOL_RAW).forEach(key=>{
  FRAME_PERK_POOLS[key] = {};
  ALL_ELEMENTS_FOR_PERKS.forEach(e=>{ FRAME_PERK_POOLS[key][e] = buildElementPerkPool(e); });
});

// Resolves the correct perk pool for a specific archetype + element,
// correctly layering in weapon-type-locked perks (Bows, Swords, Glaives,
// etc.) even when the archetype's frame pool key is shared with other
// weapon types that don't get those same type-locked perks.
function perkPoolForArchetype(arch, elem){
  const base = FRAME_PERK_POOLS[arch.framePool][elem];
  const cat = weaponCategoryFor(arch.name);
  return cat ? [...base, ...(WEAPON_TYPE_PERKS[cat]||[])] : base;
}

// ---- ARMOR MODS BY SLOT (Armor 3.0) ----
// Real mods split by which armor piece they socket into. Many are pure
// ammo/utility mods (ammo finders, targeting, unflinching, loaders,
// dexterity, reserves) that don't move any of this tool's synergy % buckets —
// those are still listed (so the full roster is here) but marked utility-only
// via `desc` instead of `effects`, rather than faked with invented numbers.
// Elemental families. Order matters for the dropdown; Harmonic (matches your
// subclass element) leads, then Kinetic, then the five subclass elements.
const ELEMENTS_FOR_MODS = ["Harmonic","Kinetic","Arc","Solar","Void","Stasis","Strand"];

function elementalUtilityMods(prefix, descTemplate, energy){
  return ELEMENTS_FOR_MODS.map(e=>({name:`${e} ${prefix}`, grants:[], effects:[], desc:descTemplate(e), energy: energy || 1}));
}
// Weapon Surge exists for every element including Kinetic and Harmonic.
function elementalWeaponSurge(){
  return ELEMENTS_FOR_MODS.map(e=>({name:`${e} Weapon Surge`, grants:[], effects:[{bucket:"damage",value:6,cond:"matching-element",note:`${e} weapon damage buff while you have Armor Charge (stacks 10%/17%/22%)`}], energy:3}));
}
// Siphon spawns an Orb of Power from rapid matching-element weapon final
// blows — the primary Armor Charge generator. Harmonic costs a little more.
function elementalSiphon(){
  return ELEMENTS_FOR_MODS.map(e=>({name:`${e} Siphon`, grants:[], effects:[{bucket:"grenadeEnergy",value:4,cond:"matching-element",note:`rapid ${e} weapon final blows spawn an Orb of Power`}], energy: e==="Harmonic"?2:1}));
}
// Holster gradually reloads a stowed weapon of the matching family (Legs).
function elementalHolster(){
  return ELEMENTS_FOR_MODS.map(e=>({name:`${e} Holster`, grants:[], effects:[], desc:`stowed ${e} weapons steadily reload while holstered — utility only`, energy: e==="Harmonic"?2:1}));
}

  super: null, // name of selected super within current subclass
  aspects: [], // names, max 2
  fragments: [], // names, max 3 (represents fragment slot count roughly)
  grenade: null, // name
  melee: null, // name
  exoticArmor: null,
  classItemPerks: {col1:null, col2:null}, // Prismatic-only exotic class item perk picks
  armorFilter: "synergy", // "synergy" = only show pieces matching current element + Any; "all" = show everything
  exoticWeaponSlot: {Kinetic:null, Energy:null, Power:null}, // only one exotic weapon equippable at a time really; we allow pick of one
  activeExoticWeapon: null, // name
  exoticWeaponFilter: {Kinetic:"all", Energy:"all", Power:"all"}, // burn filter per slot
  legendary: {Kinetic:null, Energy:null, Power:null}, // {name, tier, element, barrel, mag, perk1, perk2, originTrait, mod}
  mods: {Helmet:[], Arms:[], Chest:[], Legs:[], ClassItem:[]}, // up to 4 regular mods per slot
  tuning: {Helmet:null, Arms:null, Chest:null, Legs:null, ClassItem:null}, // one Tier 5 tuning mod per slot
  artifact: null,
  artifactPerks: [], // up to 7 names total across column1/2/3, gated by progression
  armorSetByPiece: {Helmet:null,Arms:null,Chest:null,Legs:null,ClassItem:null}, // each of the 5 pieces can be socketed with a different set's bonus
  // Armor 3.0 tier per piece (1-5). Tier 4 & 5 have 11 mod energy; T1-3 have
  // 10. Tier 5 also unlocks the stat-tuning slot (tuning costs 0 energy).
  armorTier: {Helmet:5, Arms:5, Chest:5, Legs:5, ClassItem:5},
  // Armor 3.0 masterwork: masterworking a piece raises its 3 lowest stats by
  // +1 per level, up to +5 each at level 5 (it NO LONGER affects mod energy).
  // Real per-item rolls aren't modeled, so you pick which 3 stats benefit.
  armorMasterwork: {
    Helmet: {level:0, stats:[]}, Arms: {level:0, stats:[]}, Chest: {level:0, stats:[]},
    Legs: {level:0, stats:[]}, ClassItem: {level:0, stats:[]},
  },
};

function defaultSuperFor(cls, element){
  const sc = SUBCLASSES[cls][element];
  return sc.supers && sc.supers.length ? sc.supers[0].name : null;
}
state.super = defaultSuperFor(state.cls, state.element);

function resetState(){
  state.cls="Titan"; state.element="Solar"; state.aspects=[]; state.fragments=[];
  state.grenade=null; state.melee=null;
  state.super = defaultSuperFor(state.cls, state.element);
  state.exoticArmor=null; state.activeExoticWeapon=null; state.armorFilter="synergy";
  state.exoticWeaponFilter={Kinetic:"all",Energy:"all",Power:"all"};
  state.classItemPerks={col1:null,col2:null};
  state.legendary={Kinetic:null,Energy:null,Power:null};
  state.mods={Helmet:[],Arms:[],Chest:[],Legs:[],ClassItem:[]};
  state.tuning={Helmet:null,Arms:null,Chest:null,Legs:null,ClassItem:null};
  state.artifact=null; state.artifactPerks=[];
  state.armorSetByPiece={Helmet:null,Arms:null,Chest:null,Legs:null,ClassItem:null};
  state.armorTier={Helmet:5,Arms:5,Chest:5,Legs:5,ClassItem:5};
  state.armorMasterwork={Helmet:{level:0,stats:[]},Arms:{level:0,stats:[]},Chest:{level:0,stats:[]},Legs:{level:0,stats:[]},ClassItem:{level:0,stats:[]}};
  render();
}

/* =========================================================================
   ENGINE
   ========================================================================= */
function collectComponents(){
  const comps = [];
  const sc = SUBCLASSES[state.cls][state.element];
  const chosenSuper = (sc.supers||[]).find(s=>s.name===state.super) || (sc.supers||[])[0];
  if(chosenSuper) comps.push({source:`${state.element} Super: ${chosenSuper.name}`, grants:chosenSuper.grants, effects:chosenSuper.effects});
  sc.aspects.forEach(a=>{
    if(state.aspects.includes(a.name)) comps.push({source:`Aspect: ${a.name}`, grants:a.grants, effects:a.effects});
  });
  (FRAGMENTS[state.element]||[]).forEach(f=>{
    if(state.fragments.includes(f.name)) comps.push({source:`Fragment: ${f.name}`, grants:f.grants, effects:f.effects});
  });
  if(state.grenade){
    const grenadePool = state.element==="Prismatic" ? ["Arc","Solar","Void","Stasis","Strand"].flatMap(e=>GRENADES[e]) : (GRENADES[state.element]||[]);
    const g = grenadePool.find(x=>x.name===state.grenade);
    if(g) comps.push({source:`Grenade: ${g.name}`, grants:g.grants, effects:g.effects});
  }
  if(state.melee){
    const meleePool = state.element==="Prismatic" ? ["Arc","Solar","Void","Stasis","Strand"].flatMap(e=>MELEES[state.cls][e]) : (MELEES[state.cls][state.element]||[]);
    const m = meleePool.find(x=>x.name===state.melee);
    if(m) comps.push({source:`Melee: ${m.name}`, grants:m.grants, effects:m.effects});
  }
  if(state.exoticArmor){
    const ea = EXOTIC_ARMOR[state.cls].find(e=>e.name===state.exoticArmor);
    if(ea){
      if(ea.effects && ea.effects.length) comps.push({source:`Exotic Armor: ${ea.name}`, grants:ea.grants, effects:ea.effects});
      const classItemPool = EXOTIC_CLASS_ITEM_PERKS[state.cls];
      if(classItemPool && ea.name === classItemPool.name){
        const p1 = classItemPool.column1.find(p=>p.name===state.classItemPerks.col1);
        const p2 = classItemPool.column2.find(p=>p.name===state.classItemPerks.col2);
        if(p1) comps.push({source:`${ea.name} — ${p1.name}`, grants:p1.grants, effects:p1.effects});
        if(p2) comps.push({source:`${ea.name} — ${p2.name}`, grants:p2.grants, effects:p2.effects});
      }
    }
  }
  if(state.activeExoticWeapon){
    const ew = EXOTIC_WEAPONS.find(e=>e.name===state.activeExoticWeapon);
    if(ew) comps.push({source:`Exotic Weapon: ${ew.name}`, grants:ew.grants, effects:ew.effects});
  }
  Object.entries(state.legendary).forEach(([slot,val])=>{
    if(!val) return;
    const arch = LEGENDARY_ARCHETYPES.find(a=>a.name===val.name);
    if(!arch) return;
    const tierMult = 1 + (val.tier-1)*WEAPON_TIER_DMG_PER_TIER;
    const elem = val.element || 'Kinetic';
    const perkPool = perkPoolForArchetype(arch, elem);
    const poolLookups = [
      {field:'barrel', pool:FRAME_BARREL_POOLS, label:'Barrel'},
      {field:'mag', pool:FRAME_MAG_POOLS, label:'Mag'},
      {field:'perk1', options:perkPool, label:'Perk 1'},
      {field:'perk2', options:perkPool, label:'Perk 2'},
      {field:'originTrait', pool:FRAME_ORIGIN_TRAIT_POOLS, label:'Origin Trait'},
      {field:'mod', pool:FRAME_MOD_POOLS, label:'Mod'},
    ];
    poolLookups.forEach(({field, pool, options, label})=>{
      const chosenName = val[field];
      if(!chosenName) return;
      const resolvedOptions = options || (pool[arch.framePool] && pool[arch.framePool][elem]) || [];
      const item = resolvedOptions.find(p=>p.name===chosenName);
      if(item && item.effects && item.effects.length){
        const scaled = item.effects.map(e=>({...e, value: Math.round(e.value*tierMult*10)/10}));
        comps.push({source:`${slot} (T${val.tier}) ${arch.name} [${elem}] — ${label}: ${item.name}`, grants:item.grants||[], effects:scaled});
      }
    });
    // Weapon masterwork: real mechanic is +1 to one stat per tier (max +10,
    // not modeled here since this tool doesn't track raw weapon stats like
    // Range/Stability) plus generating Orbs of Power on multikills — that
    // part IS representable here as a Super Energy contribution.
    if(val.masterworked){
      comps.push({source:`${slot} (T${val.tier}) ${arch.name} — Masterworked`, grants:["orbOfPower"], effects:[{bucket:"superEnergy",value:4,cond:"orbOfPower",note:"generates Orbs of Power on multikills"}]});
    }
  });
  ["Helmet","Arms","Chest","Legs","ClassItem"].forEach(slotName=>{
    (state.mods[slotName]||[]).forEach(modName=>{
      const m = ARMOR_MODS_BY_SLOT[slotName].find(x=>x.name===modName);
      if(m && m.effects && m.effects.length) comps.push({source:`${slotName} Mod: ${m.name}`, grants:m.grants||[], effects:m.effects});
    });
    const tuneName = state.tuning[slotName];
    if(tuneName){
      const t = TUNING_MODS_BY_SLOT[slotName].find(x=>x.name===tuneName);
      if(t) comps.push({source:`${slotName} Tuning: ${t.name}`, grants:[], effects:t.effects});
    }
  });
  if(state.artifact){
    const art = ARTIFACTS.find(a=>a.name===state.artifact);
    if(art){
      state.artifactPerks.forEach(perkName=>{
        const perk = ARTIFACT_PERK_LIBRARY[perkName];
        if(perk && perk.effects && perk.effects.length) comps.push({source:`Artifact: ${perkName}`, grants:perk.grants||[], effects:perk.effects});
      });
    }
  }
  // Armor 3.0: each of the 5 armor pieces can be independently socketed with
  // ANY set's bonus perk — you're not required to wear a matching physical
  // set. So count how many pieces currently have EACH set name selected;
  // any set reaching 2 gets its 2pc bonus, reaching 4 also adds its 4pc
  // bonus, and multiple different sets can all be active at once this way.
  const setCounts = {};
  Object.values(state.armorSetByPiece).forEach(setName=>{
    if(setName) setCounts[setName] = (setCounts[setName]||0) + 1;
  });
  Object.entries(setCounts).forEach(([setName, count])=>{
    if(count < 2) return;
    const set = ARMOR_SETS.find(s=>s.name===setName);
    if(!set) return;
    comps.push({source:`Armor Set (2pc): ${set.twoPiece.name}`, grants:set.twoPiece.grants||[], effects:set.twoPiece.effects});
    if(count >= 4){
      comps.push({source:`Armor Set (4pc): ${set.fourPiece.name}`, grants:set.fourPiece.grants||[], effects:set.fourPiece.effects});
    }
  });
  return comps;
}

// ---- CHARACTER STATS (real Armor 3.0 system: Weapons/Health/Class/Grenade/
// Super/Melee, 0-200 each, T0-T20 in steps of 10) ----
// Tuning mod NAMES already literally encode real stat point trades (e.g.
// "+5 Weapons / -5 Super", "Balanced Tuning (+1 Class/Melee/Grenade)"), so
// rather than inventing separate data, we parse the real point deltas
// straight out of the names already in TUNING_MODS_BY_SLOT.
const STAT_NAMES = ["Weapons","Health","Class","Grenade","Super","Melee"];
function parseTuningStatDeltas(name){
  const deltas = {};
  const balancedMatch = name.match(/Balanced Tuning \(\+(\d+) ([A-Za-z/]+)\)/);
  if(balancedMatch){
    const amt = parseInt(balancedMatch[1],10);
    balancedMatch[2].split("/").forEach(stat=>{ deltas[stat] = (deltas[stat]||0) + amt; });
    return deltas;
  }
  const swapMatch = name.match(/\+(\d+) (\w+) \/ -(\d+) (\w+)/);
  if(swapMatch){
    deltas[swapMatch[2]] = (deltas[swapMatch[2]]||0) + parseInt(swapMatch[1],10);
    deltas[swapMatch[4]] = (deltas[swapMatch[4]]||0) - parseInt(swapMatch[3],10);
  }
  return deltas;
}
function computeCharacterStats(){
  const totals = {}; STAT_NAMES.forEach(s=>totals[s]=0);
  const contributors = {}; STAT_NAMES.forEach(s=>contributors[s]=[]);
  ["Helmet","Arms","Chest","Legs","ClassItem"].forEach(slotName=>{
    const tuneName = state.tuning[slotName];
    if(!tuneName) return;
    const deltas = parseTuningStatDeltas(tuneName);
    Object.entries(deltas).forEach(([stat,val])=>{
      if(totals[stat]===undefined) return; // ignore unrecognized stat tokens
      totals[stat]+=val;
      contributors[stat].push({source:`${slotName} tuning`, value:val});
    });
  });
  // Armor 3.0 masterwork: +5 to each of the (up to 3) stats you've marked as
  // this piece's "weak" stats — real armor gives this to whichever 3 stats
  // aren't its primary/secondary/tertiary roll, which isn't data this tool
  // has per real item, so you choose which 3 apply.
  // Armor 3.0 masterwork: raises the (up to 3) stats you've marked as this
  // piece's lowest stats by +1 per masterwork level (max +5 each at level 5).
  ["Helmet","Arms","Chest","Legs","ClassItem"].forEach(slotName=>{
    const mw = state.armorMasterwork[slotName];
    if(!mw || !mw.level) return;
    mw.stats.forEach(stat=>{
      if(totals[stat]===undefined) return;
      totals[stat]+=mw.level;
      contributors[stat].push({source:`${slotName} masterwork (T${mw.level})`, value:mw.level});
    });
  });
  return {totals, contributors};
}
function statTier(points){ return Math.max(0, Math.min(20, Math.floor(points/10))); }

function computeSynergy(){
  const comps = collectComponents();
  const activeTags = new Set();
  comps.forEach(c=>(c.grants||[]).forEach(g=>activeTags.add(g)));
  const totals = {}; BUCKETS.forEach(b=>totals[b.id]=0);
  const contributors = {}; BUCKETS.forEach(b=>contributors[b.id]=[]);
  comps.forEach(c=>{
    (c.effects||[]).forEach(e=>{
      const unlocked = !e.cond || activeTags.has(e.cond);
      if(unlocked){
        totals[e.bucket]+=e.value;
        contributors[e.bucket].push({source:c.source, value:e.value, note:e.note||"", cond:e.cond||null});
      } else {
        contributors[e.bucket].push({source:c.source, value:0, note:(e.note?e.note+" — ":"")+`inactive (needs "${e.cond}" from elsewhere in build)`, cond:e.cond, inactive:true});
      }
    });
  });
  return {totals, contributors, activeTags:[...activeTags]};
}

/* =========================================================================
   RENDER — BUILDER (left column)
   ========================================================================= */
function el(tag, cls, html){ const e=document.createElement(tag); if(cls) e.className=cls; if(html!==undefined) e.innerHTML=html; return e; }

// Per-panel collapse state — persists across re-renders since renderBuilder()
// rebuilds the DOM from scratch every call. Clicking any panel's header
// toggles just that one panel, letting people focus on a single section.
// Same structural pattern as the Build Synergy / Character Stats accordions:
// a separate clickable header row, and a separate content div that gets
// .collapsed (display:none) toggled on it directly.
const PANEL_LABELS = {
  p1:"Class & Subclass", p2:"Exotic Armor", p3:"Exotic Weapon",
  p4:"Tiered Legendary Weapons", p5:"Armor Mods", p6:"Seasonal Artifact", p7:"Legendary Armor Set Bonus",
};
const panelCollapsed = {p1:false,p2:false,p3:false,p4:false,p5:false,p6:false,p7:false};
function makePanel(id, headerHTML){
  const header = el('div','accordionHead');
  header.id = 'panelHead_'+id;
  header.appendChild(el('h2','', headerHTML));
  const clearBtn = el('button','panelClear','Clear');
  clearBtn.setAttribute('data-testid','clear-panel-'+id);
  clearBtn.title = 'Clear this section without resetting the whole build';
  clearBtn.onclick = (e)=>{ e.stopPropagation(); clearPanel(id); };
  header.appendChild(clearBtn);
  const chev = el('span','chev'+(panelCollapsed[id]?'':' open'), '&#9656;');
  header.appendChild(chev);
  header.onclick = ()=>{ panelCollapsed[id] = !panelCollapsed[id]; render(); };
  const body = el('div','panel'+(panelCollapsed[id]?' collapsed':''));
  return {header, body};
}
// QoL: clear just one section's selections on the fly, instead of scrolling
// up to Reset Build and starting the whole loadout over.
function clearPanel(id){
  switch(id){
    case 'p1': state.aspects=[]; state.fragments=[]; state.grenade=null; state.melee=null; state.super=defaultSuperFor(state.cls,state.element); break;
    case 'p2': state.exoticArmor=null; state.classItemPerks={col1:null,col2:null}; break;
    case 'p3': state.activeExoticWeapon=null; break;
    case 'p4': state.legendary={Kinetic:null,Energy:null,Power:null}; break;
    case 'p5': state.mods={Helmet:[],Arms:[],Chest:[],Legs:[],ClassItem:[]}; state.tuning={Helmet:null,Arms:null,Chest:null,Legs:null,ClassItem:null}; break;
    case 'p6': state.artifact=null; state.artifactPerks=[]; break;
    case 'p7': state.armorSetByPiece={Helmet:null,Arms:null,Chest:null,Legs:null,ClassItem:null}; break;
  }
  render();
}
function openPanel(id){
  panelCollapsed[id] = false;
  render();
  const headerEl = document.getElementById('panelHead_'+id);
  if(headerEl && headerEl.scrollIntoView) headerEl.scrollIntoView({behavior:'smooth', block:'start'});
  closeDrawer();
}

function renderBuilder(){
  const root = document.getElementById('builderCol');
  root.innerHTML = "";

  // Class + Element panel
  const {header: p1Head, body: p1} = makePanel('p1', '<span class="n">01</span> Class &amp; Subclass');
  root.appendChild(p1Head);
  const clsRow = el('div','row');
  const clsSel = el('select');
  ["Titan","Hunter","Warlock"].forEach(c=>{
    const o=document.createElement('option'); o.value=c; o.textContent=c; if(c===state.cls) o.selected=true; clsSel.appendChild(o);
  });
  clsSel.onchange = ()=>{ state.cls=clsSel.value; state.aspects=[]; state.exoticArmor=null; state.classItemPerks={col1:null,col2:null}; state.super=defaultSuperFor(state.cls,state.element); state.melee=null; render(); };
  clsRow.appendChild(clsSel);
  p1.appendChild(clsRow);

  const tabs = el('div','subclasstabs');
  ELEMENTS.forEach(elem=>{
    const b = document.createElement('button');
    b.textContent = elem;
    if(elem===state.element){ b.classList.add('active'); b.style.background=ELEMENT_COLOR[elem]; b.style.color="#0a0c0f"; b.style.borderColor=ELEMENT_COLOR[elem]; }
    b.onclick=()=>{ state.element=elem; state.aspects=[]; state.fragments=[]; state.super=defaultSuperFor(state.cls,elem); state.grenade=null; state.melee=null; render(); };
    tabs.appendChild(b);
  });
  p1.appendChild(document.createElement('div')).style.height="10px";
  p1.appendChild(tabs);

  const sc = SUBCLASSES[state.cls][state.element];

  p1.appendChild(el('div','', '<div style="font-size:11px;color:var(--muted);margin:2px 0 6px;text-transform:uppercase;letter-spacing:.06em;">Super <span style="color:var(--muted2);text-transform:none;">(pick one)</span></div>'));
  const superGrid = el('div','chipgrid');
  (sc.supers||[]).forEach(s=>{
    const active = state.super===s.name;
    const chip = el('div','chip'+(active?' active':''), `<span class="nm">${s.name}</span><span class="desc">${s.effects.map(e=>e.note||BUCKETS.find(b=>b.id===e.bucket).name+' +'+e.value+'%'+(e.cond?` (if ${e.cond})`:'')).join(', ')}</span>`);
    chip.style.setProperty('--accent', ELEMENT_COLOR[state.element]);
    chip.onclick=()=>{ state.super = s.name; render(); };
    superGrid.appendChild(chip);
  });
  p1.appendChild(superGrid);
  p1.appendChild(document.createElement('div')).style.height="6px";

  const aspectGrid = el('div','chipgrid');
  sc.aspects.forEach(a=>{
    const active = state.aspects.includes(a.name);
    const chip = el('div','chip'+(active?' active':''), `<span class="nm">${a.name}</span><span class="desc">${a.effects.map(e=>e.note||BUCKETS.find(b=>b.id===e.bucket).name+' +'+e.value+'%').join(', ')}</span>`);
    chip.style.setProperty('--accent', ELEMENT_COLOR[state.element]);
    chip.onclick=()=>{
      if(active){ state.aspects=state.aspects.filter(x=>x!==a.name); }
      else { if(state.aspects.length>=2) state.aspects.shift(); state.aspects.push(a.name); }
      render();
    };
    aspectGrid.appendChild(chip);
  });
  p1.appendChild(el('div','', '<div style="font-size:11px;color:var(--muted);margin:8px 0 2px;text-transform:uppercase;letter-spacing:.06em;">Aspects (max 2)</div>'));
  p1.appendChild(aspectGrid);

  // Grenade + Melee — Prismatic can pull from any element's pool for both;
  // other elements are locked to their own grenade pool and this class's
  // melee for that element.
  const grenadeOptions = state.element==="Prismatic"
    ? ["Arc","Solar","Void","Stasis","Strand"].flatMap(e=>GRENADES[e])
    : (GRENADES[state.element]||[]);
  const meleeOptions = state.element==="Prismatic"
    ? ["Arc","Solar","Void","Stasis","Strand"].flatMap(e=>MELEES[state.cls][e])
    : (MELEES[state.cls][state.element]||[]);

  const abilityRow = el('div','row');
  abilityRow.style.display='flex'; abilityRow.style.gap='10px'; abilityRow.style.margin='8px 0';

  const grenadeWrap = el('div',''); grenadeWrap.style.flex='1';
  grenadeWrap.appendChild(el('div','', '<div style="font-size:11px;color:var(--muted);margin-bottom:2px;text-transform:uppercase;letter-spacing:.06em;">Grenade</div>'));
  const grenadeSel = el('select');
  const gNone = document.createElement('option'); gNone.value=""; gNone.textContent="— none —"; grenadeSel.appendChild(gNone);
  grenadeOptions.forEach(g=>{
    const o=document.createElement('option'); o.value=g.name; o.textContent=g.name;
    if(state.grenade===g.name) o.selected=true;
    grenadeSel.appendChild(o);
  });
  grenadeSel.onchange=()=>{ state.grenade = grenadeSel.value||null; render(); };
  grenadeWrap.appendChild(grenadeSel);
  abilityRow.appendChild(grenadeWrap);

  const meleeWrap = el('div',''); meleeWrap.style.flex='1';
  meleeWrap.appendChild(el('div','', '<div style="font-size:11px;color:var(--muted);margin-bottom:2px;text-transform:uppercase;letter-spacing:.06em;">Melee</div>'));
  const meleeSel = el('select');
  const mNone = document.createElement('option'); mNone.value=""; mNone.textContent="— none —"; meleeSel.appendChild(mNone);
  meleeOptions.forEach(m=>{
    const o=document.createElement('option'); o.value=m.name; o.textContent=m.name;
    if(state.melee===m.name) o.selected=true;
    meleeSel.appendChild(o);
  });
  meleeSel.onchange=()=>{ state.melee = meleeSel.value||null; render(); };
  meleeWrap.appendChild(meleeSel);
  abilityRow.appendChild(meleeWrap);

  p1.appendChild(abilityRow);

  if(state.grenade){
    const g = grenadeOptions.find(x=>x.name===state.grenade);
    if(g){
      const note = el('div','empty-note', `${g.name}: ${g.effects.map(e=>BUCKETS.find(b=>b.id===e.bucket).name+' +'+e.value+'%'+(e.cond?` (if ${e.cond})`:'')+(e.note?' — '+e.note:'')).join(', ')}`);
      note.style.fontStyle='normal'; note.style.marginBottom='4px';
      p1.appendChild(note);
    }
  }
  if(state.melee){
    const m = meleeOptions.find(x=>x.name===state.melee);
    if(m){
      const note = el('div','empty-note', `${m.name}: ${m.effects.map(e=>BUCKETS.find(b=>b.id===e.bucket).name+' +'+e.value+'%'+(e.cond?` (if ${e.cond})`:'')+(e.note?' — '+e.note:'')).join(', ')}`);
      note.style.fontStyle='normal'; note.style.marginBottom='8px';
      p1.appendChild(note);
    }
  }

  // Fragment slot total depends on which aspects are equipped (each aspect
  // contributes 2-3 slots), matching how fragment capacity actually scales
  // with aspect choice in-game — so the cap here is dynamic, not a flat number.
  const maxFragments = sc.aspects
    .filter(a=>state.aspects.includes(a.name))
    .reduce((sum,a)=>sum+(a.fragSlots||2), 0) || 2;
  if(state.fragments.length > maxFragments){
    state.fragments = state.fragments.slice(state.fragments.length - maxFragments);
  }

  const fragGrid = el('div','chipgrid');
  (FRAGMENTS[state.element]||[]).forEach(f=>{

  if(isClassItemChosen){

  // Exotic Weapon — one dropdown per slot; picking one clears the others

  // Legendary tiered weapons — archetype + element + pick 2 perks each
  const {header: p4Head, body: p4} = makePanel('p4', '<span class="n">04</span> Tiered Legendary Weapons');
  root.appendChild(p4Head);
  ["Kinetic","Energy","Power"].forEach(slot=>{
    const activeExoticSlot = state.activeExoticWeapon ? (EXOTIC_WEAPONS.find(w=>w.name===state.activeExoticWeapon)||{}).slot : null;
    if(activeExoticSlot === slot){

      const lockedNote = el('div','empty-note', `Occupied by exotic weapon: <b style="font-style:normal;color:var(--gold);">${state.activeExoticWeapon}</b> — clear it above to pick a legendary here instead.`);

      tp.style.marginLeft="86px"; tp.style.marginBottom="8px";
      for(let t=1;t<=5;t++){
        const b=document.createElement('button'); b.textContent="T"+t;
        if(state.legendary[slot].tier===t) b.classList.add('active');
        b.onclick=()=>{ state.legendary[slot].tier=t; render(); };
        tp.appendChild(b);
      }
      wrap.appendChild(tp);

      // Element picker (Kinetic slot is always Kinetic-only)
      const elementOptions = slot==="Kinetic" ? ["Kinetic"] : ["Solar","Arc","Void","Stasis","Strand","Kinetic"];
      if(elementOptions.length>1){
        const elRow = el('div','slotrow');
        elRow.style.marginBottom="8px";
        elRow.appendChild(el('label','','Element'));
        const elSel = el('select');

        def.pool.forEach(item=>{
          const o=document.createElement('option'); o.value=item.name; o.textContent=item.name;
          if(state.legendary[slot][def.field]===item.name) o.selected=true;

        sel.onchange=()=>{ state.legendary[slot][def.field] = sel.value || null; render(); };
        col.appendChild(sel);
        slotsRow.appendChild(col);

        const chosen = def.pool.find(p=>p.name===state.legendary[slot][def.field]);
        if(chosen) chosenItems.push({label:def.label, item:chosen});
      });
      wrap.appendChild(slotsRow);

      // Weapon Masterwork — real mechanic is +1/tier to a raw weapon stat

      const mwWeaponLabel = document.createElement('label');
      mwWeaponLabel.style.display = 'flex'; mwWeaponLabel.style.alignItems = 'center'; mwWeaponLabel.style.gap = '6px'; mwWeaponLabel.style.cursor = 'pointer'; mwWeaponLabel.style.marginTop = '6px';
      const mwWeaponCheckbox = document.createElement('input');

        emptyNote.style.margin='6px 0';
        wrap.appendChild(emptyNote);

    }
    p4.appendChild(wrap);

  root.appendChild(p4);

  // Armor Mods — one regular mod + one Tier 5 tuning mod per armor slot
  const {header: p5Head, body: p5} = makePanel('p5', '<span class="n">05</span> Armor Mods <span style="color:var(--muted2);font-family:Inter;text-transform:none;font-size:11px;">(4 mod slots + 1 tuning slot per piece)</span>');
  root.appendChild(p5Head);
  const slotDisplayNames = {Helmet:"Helmet", Arms:"Arms", Chest:"Chest", Legs:"Legs", ClassItem:"Class Item"};

    wrap.style.marginBottom="14px";

    wrap.style.borderBottom="1px solid var(--line-soft)";

          ? chosenMod.effects.map(e=>BUCKETS.find(b=>b.id===e.bucket).name+' '+(e.value>=0?'+':'')+e.value+'%'+(e.cond?` (if ${e.cond})`:'')).join(', ')
